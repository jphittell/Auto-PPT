<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto-PPT</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      #boot-message {
        max-width: 42rem;
        margin: 4rem auto;
        padding: 1.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      #boot-message[hidden] {
        display: none;
      }

      #boot-message h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      #boot-message p {
        margin: 0.5rem 0;
        line-height: 1.5;
      }

      #boot-message code {
        padding: 0.125rem 0.375rem;
        border-radius: 0.375rem;
        background: #e2e8f0;
      }
    </style>
    <script>
      window.__AUTO_PPT_BOOT_FROM_FILE__ = window.location.protocol === 'file:';
    </script>
  </head>
  <body class="bg-slate-50">
    <div id="boot-message">
      <h1>Loading Auto-PPT</h1>
      <p>If this message stays visible, the frontend bundle did not attach.</p>
      <p id="boot-detail">For local development, start the UI with <code>npm run dev</code> in <code>ui/</code>.</p>
    </div>
    <div id="root"></div>
    <script>
      if (window.__AUTO_PPT_BOOT_FROM_FILE__) {
        document.getElementById('boot-detail').innerHTML =
          'The built UI cannot be opened directly from disk. Start the app server with <code>pptx-gen serve</code>, then open <code>http://127.0.0.1:8000/</code>.';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
